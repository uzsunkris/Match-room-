<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Match Chat</title>

<link rel="stylesheet" href="style.css">

<script type="module" src="firebase.js"></script>

<script type="module" src="chat.js"></script>

</head>

<body>

<header class="chat-header">

<h2 id="match-name">Match Chat</h2>

<div class="coins">

Coins: <span id="coin-balance">0</span>

</div>

</header>


<div id="chat-container" class="chat-container"></div>


<footer class="chat-footer">

<input type="text" id="message-input" placeholder="Type message...">

<button id="toggle-stickers">+</button>

<button id="send-btn">Send</button>

</footer>


<div id="sticker-panel" class="sticker-panel">

<img src="stickers/sticker1.png" data-price="10">

<img src="stickers/sticker2.png" data-price="10">

<img src="stickers/sticker3.png" data-price="100">

<img src="stickers/sticker4.png" data-price="100">

</div>

</body>

</html>
